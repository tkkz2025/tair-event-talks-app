<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Notes Viewer & Tweeter</title>
    <meta name="description" content="View the latest Google Cloud BigQuery release notes, filter updates, and share them on Twitter/X.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS File -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-container">
                    <svg viewBox="0 0 24 24" width="32" height="32" class="bq-logo">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                    </svg>
                </div>
                <div class="title-container">
                    <h1>BigQuery Release Insights</h1>
                    <p class="subtitle">Stay updated with Google Cloud BigQuery developments</p>
                </div>
            </div>
            <div class="header-right">
                <button id="theme-toggle-btn" class="btn btn-secondary action-btn-circle" title="Toggle Light/Dark Theme">
                    <!-- Sun Icon (visible in light mode, hidden in dark mode) -->
                    <svg class="theme-icon-sun" viewBox="0 0 24 24" width="18" height="18">
                        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.02-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.38-.38.38-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.02.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/>
                    </svg>
                    <!-- Moon Icon (visible in dark mode, hidden in light mode) -->
                    <svg class="theme-icon-moon" viewBox="0 0 24 24" width="18" height="18">
                        <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10C2.2 6.8 6.3 2.5 11.5 2c.5-.1 1 .3 1 .8s-.2.9-.7 1.1c-3.6 1.4-6 5-6 9 0 4.9 4 9 9 9 3.8 0 7.1-2.4 8.4-5.9.2-.5.7-.7 1.2-.5s.7.7.5 1.2C23.9 18.7 18.5 22 12.3 22z"/>
                    </svg>
                </button>
                <button id="export-csv-btn" class="btn btn-secondary" title="Export current view to CSV">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/>
                    </svg>
                    <span>Export CSV</span>
                </button>
                <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
                    <svg class="icon icon-refresh" viewBox="0 0 24 24" width="20" height="20">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Stats Bar -->
        <section class="stats-bar">
            <div class="stat-card">
                <span class="stat-label">Total Updates</span>
                <span id="stat-total" class="stat-value">-</span>
            </div>
            <div class="stat-card category-feature">
                <span class="stat-label">Features</span>
                <span id="stat-features" class="stat-value">-</span>
            </div>
            <div class="stat-card category-announcement">
                <span class="stat-label">Announcements</span>
                <span id="stat-announcements" class="stat-value">-</span>
            </div>
            <div class="stat-card category-change">
                <span class="stat-label">Changes</span>
                <span id="stat-changes" class="stat-value">-</span>
            </div>
            <div class="stat-card category-resolved">
                <span class="stat-label">Resolved</span>
                <span id="stat-resolved" class="stat-value">-</span>
            </div>
        </section>

        <!-- Control Bar (Filter & Search) -->
        <section class="controls-bar">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search updates...">
            </div>
            
            <div class="filter-group">
                <button class="filter-chip active" data-type="all">All</button>
                <button class="filter-chip" data-type="Feature">Features</button>
                <button class="filter-chip" data-type="Announcement">Announcements</button>
                <button class="filter-chip" data-type="Change">Changes</button>
                <button class="filter-chip" data-type="Deprecated">Deprecated</button>
                <button class="filter-chip" data-type="Resolved">Resolved</button>
            </div>
        </section>

        <!-- Main Content Area -->
        <main class="content-area">
            <!-- Loading State -->
            <div id="loading-state" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Retrieving latest release notes...</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="error-state hidden">
                <svg class="error-icon" viewBox="0 0 24 24" width="48" height="48">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <h3>Failed to load feed</h3>
                <p id="error-msg">Unknown error occurred</p>
                <button id="retry-btn" class="btn btn-secondary">Try Again</button>
            </div>

            <!-- Updates Container -->
            <div id="updates-grid" class="updates-grid">
                <!-- Card elements will be dynamically injected here -->
            </div>
        </main>

        <!-- Twitter Web Intent Panel (Sticky Bottom Drawer) -->
        <section id="tweet-drawer" class="tweet-drawer hidden">
            <div class="drawer-content">
                <div class="drawer-header">
                    <div class="drawer-header-left">
                        <svg class="twitter-logo-small" viewBox="0 0 24 24" width="20" height="20">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                        <h3>Compose Tweet</h3>
                    </div>
                    <button id="close-drawer-btn" class="close-btn" title="Cancel">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
                        </svg>
                    </button>
                </div>
                <div class="drawer-body">
                    <textarea id="tweet-textarea" rows="4" maxlength="280" placeholder="What would you like to tweet?"></textarea>
                    <div class="tweet-footer">
                        <span class="char-counter"><span id="char-count">0</span> / 280</span>
                        <div class="drawer-actions">
                            <button id="reset-tweet-btn" class="btn btn-secondary-text">Reset</button>
                            <button id="tweet-submit-btn" class="btn btn-twitter">
                                <svg viewBox="0 0 24 24" width="16" height="16">
                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                </svg>
                                <span>Tweet</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- JS File -->
    <script src="/static/js/app.js"></script>
</body>
</html>
